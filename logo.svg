<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FileLocker logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Document outline behind the padlock -->
  <g opacity="0.22" stroke="#cbd5e1" stroke-width="3" stroke-linejoin="round" fill="none">
    <path d="M62 52 L150 52 L190 92 L190 204 L62 204 Z"/>
    <path d="M150 52 L150 92 L190 92"/>
    <line x1="82" y1="120" x2="170" y2="120" stroke-width="2"/>
    <line x1="82" y1="140" x2="170" y2="140" stroke-width="2"/>
    <line x1="82" y1="160" x2="146" y2="160" stroke-width="2"/>
  </g>

  <!-- Padlock shackle -->
  <path d="M96 132 L96 102 Q96 72 128 72 Q160 72 160 102 L160 132"
        fill="none"
        stroke="url(#lock)"
        stroke-width="14"
        stroke-linecap="round"/>

  <!-- Padlock body -->
  <rect x="74" y="128" width="108" height="80" rx="12" fill="url(#lock)"/>

  <!-- Keyhole -->
  <circle cx="128" cy="158" r="9" fill="#0f172a"/>
  <rect x="123" y="158" width="10" height="24" rx="2" fill="#0f172a"/>

  <!-- Subtle highlight on padlock body -->
  <rect x="80" y="134" width="96" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
</svg>
